<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">&#128336;</div>
      <h1>Imperial Watches</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email"
          placeholder="correo@ejemplo.com" required class="form-control" />
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" [(ngModel)]="password" name="password"
          placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required class="form-control" />
      </div>
      <div class="alert alert-danger" *ngIf="error">
        &#9888; {{ error }}
      </div>
      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Iniciar Sesion</span>
        <span *ngIf="loading">Cargando...</span>
      </button>
    </form>
    <div class="login-footer">
      No tienes cuenta?
      <a routerLink="/register">Registrate aqui</a>
    </div>
  </div>
</div>
