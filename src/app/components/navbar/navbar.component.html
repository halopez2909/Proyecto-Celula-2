<nav class="navbar">
  <a routerLink="/" class="nav-brand" aria-label="Inicio">
    <span class="nav-logo">⌚</span>
    <span>Relojería</span>
  </a>
  <button class="nav-toggle" type="button" aria-label="Abrir menú" (click)="menuOpen = !menuOpen">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" [class.open]="menuOpen">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a></li>
    <li><a routerLink="/catalog" routerLinkActive="active">Catálogo</a></li>

      <li><a routerLink="/orders" routerLinkActive="active">Mis pedidos</a></li>
      <li><a routerLink="/crear-pedido" routerLinkActive="active">Crear pedido</a></li>
      <li><a class="nav-logout" (click)="logout()">Cerrar sesión</a></li>
    } @else {
      <li><a routerLink="/login" routerLinkActive="active">Login</a></li>
    }
  </ul>
</nav>
